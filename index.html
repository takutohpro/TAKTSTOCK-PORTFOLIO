<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAKTSTOCK</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;700;800&family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="./css/style.css">

    <!-- SEO -->
    <meta name="description" content="TAKTSTOCK - Creative Digital Portfolio.">
</head>

<body>
    <!-- Mouse Trail Canvas -->
    <canvas id="trail-canvas"></canvas>

    <header class="site-header" id="site-header">
        <nav>
            <a href="#hero" class="logo">
                <span class="logo-text">TAKTSTOCK</span>
            </a>
            <div class="menu-items">
                <a href="#hero">HOME</a>
                <a href="#about">ABOUT</a>
                <a href="#gallery">GALLERY</a>
                <a href="#contact">CONTACT</a>
            </div>
            <div class="menu-toggle" id="menu-toggle">
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu" id="mobile-menu">
        <a href="#hero">HOME</a>
        <a href="#about">ABOUT</a>
        <a href="#gallery">GALLERY</a>
        <a href="#contact">CONTACT</a>
    </div>

    <main>
        <!-- Hero Section -->
        <section id="hero" class="hero-section">
            <div class="hero-content">
                <div class="hero-title-wrap">
                    <h1 class="hero-title" id="hero-title">TAKTSTOCK</h1>
                </div>

                <div class="scroll-indicator">
                    <div class="scroll-line"></div>
                    <span>SCROLL</span>
                </div>
            </div>
        </section>

        <!-- About Section -->
        <section id="about" class="about-section reveal">
            <div class="container">
                <div class="glass-panel reveal-panel">
                    <div class="section-header">
                        <h2 class="section-title reveal-title">About.</h2>
                        <div class="section-line reveal-line"></div>
                    </div>
                    <div class="about-grid stagger-children">
                        <div class="bio">
                            <p class="stagger-item">『TAKTSTOCK』はブランドの世界観を形にするWebデザインスタジオです。</p>
                            <p class="stagger-item">お客様のビジョンに寄り添い、記憶に残るビジュアル体験を設計します。</p>
                            <p class="stagger-item">細部までこだわり抜いたハイエンドなサイト制作を得意としています。</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Gallery Section -->
        <section id="gallery" class="gallery-section reveal">
            <div class="container">
                <div class="glass-panel reveal-panel">
                    <div class="section-header">
                        <h2 class="section-title reveal-title">Gallery.</h2>
                        <div class="section-line reveal-line"></div>
                    </div>
                    <div class="gallery-grid stagger-children">
                        <div class="gallery-item stagger-item">
                            <div class="gallery-item-inner" style="background-image: url('./images/gallery1.png');">
                            </div>

                        </div>
                        <div class="gallery-item stagger-item">
                            <div class="gallery-item-inner" style="background-image: url('./images/gallery2.png');">
                            </div>

                        </div>
                        <div class="gallery-item stagger-item">
                            <div class="gallery-item-inner" style="background-image: url('./images/gallery3.png');">
                            </div>

                        </div>
                        <div class="gallery-item stagger-item">
                            <div class="gallery-item-inner" style="background-image: url('./images/gallery4.png');">
                            </div>

                        </div>
                        <div class="gallery-item stagger-item">
                            <div class="gallery-item-inner" style="background-image: url('./images/gallery5.png');">
                            </div>

                        </div>
                        <div class="gallery-item stagger-item">
                            <div class="gallery-item-inner" style="background-image: url('./images/gallery6.png');">
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Contact Section -->
        <section id="contact" class="contact-section reveal">
            <div class="container">
                <div class="glass-panel reveal-panel">
                    <div class="section-header">
                        <h2 class="section-title reveal-title">Contact.</h2>
                        <div class="section-line reveal-line"></div>
                    </div>
                    <div class="contact-content stagger-children">
                        <a href="mailto:taktstockbiz@gmail.com" class="huge-link stagger-item">
                            <svg class="mail-icon" viewBox="0 0 24 24" width="24" height="24" fill="none"
                                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="4" width="20" height="16" rx="2" />
                                <path d="M22 4L12 13 2 4" />
                            </svg>
                            <span class="link-text">taktstockbiz@gmail.com</span>
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <span>© 2026 TAKTSTOCK.</span>
    </footer>

    <!-- Minimal Script -->
    <script src="./js/main.js"></script>
</body>

</html>
